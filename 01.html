<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>皇帝・極盛治世</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin:0;
  height:100%;
  font-family:"Noto Serif TC", serif;
  background: linear-gradient(to bottom, #fff3e0, #ffe0b2);
  color:#5a3e1b;
  display:flex;
  flex-direction:column;
}
header {
  padding:12px;
  background:#ffcc80;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #e0a96d;
  flex-shrink:0;
}
.stat span { margin-right:10px; }
.container { flex:1 1 auto; overflow-y:auto; padding:15px; padding-bottom:220px; }

.panel {
  background:#fff3e0;
  border:1px solid #e0a96d;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}
.panel h2 { margin-top:0; color:#d67f00; }
.hidden { display:none; }

/* ===== 原本 button 全域設定直接「取代」成以下 ===== */
button {
  width:100%;
  max-width:320px;      /* 桌面版不會過長 */
  padding:10px 14px;
  margin:8px auto 0;    /* 置中 */
  display:block;
  border-radius:8px;
  border:none;
  font-size:15px;
  cursor:pointer;
  transition:all .2s ease;
}

button:hover{
  transform:translateY(-2px);
}

/* 大螢幕桌面版 */
@media (min-width: 992px){
  .container{
    max-width:1200px;
    width:92%;
    margin:0 auto;
  }

  /* 奏摺按鈕區可多欄 */
  #memoBtns,
  #taskBtns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-start;
  }

  #memoBtns button,
  #taskBtns button{
    width:auto;
    min-width:180px;
    max-width:240px;
    margin:0;
  }

  /* 存檔區橫向 */
  .panel:last-child{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .panel:last-child button{
    width:auto;
    min-width:180px;
    margin:0;
  }

  /* footer 不要太寬 */
  .footer{
    justify-content:center;
    gap:10px;
    padding:8px 12px;
  }

  .footer button{
    flex:0 1 auto;
    min-width:120px;
    max-width:180px;
    border-radius:8px;
    background:rgba(255,255,255,0.35);
  }
}

/* 平板 */
@media (min-width: 768px) and (max-width: 991px){
  #memoBtns,
  #taskBtns{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  #memoBtns button,
  #taskBtns button{
    width:calc(50% - 8px);
    max-width:none;
    margin:0;
  }
}

/* 手機 */
@media (max-width: 767px){
  button{
    max-width:none;
    width:100%;
  }

  .footer button{
    font-size:13px;
    padding:10px 4px;
  }

  header{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .stat{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
}

/* 官方欄位也更整齊 */
.official{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* 返回首頁按鈕桌面版縮短 */
.nav-link a{
  display:inline-block;
  max-width:240px;
  text-align:center;
}

.btn-green { background:#ffa726; color:#fff; }
.btn-gray { background:#bdbdbd; color:#fff; }
.btn-red { background:#d84315; color:#fff; }

.footer {
  position: fixed;
  bottom:0;
  left:0;
  width:100%;
  background-color:#ffcc80;
  display:flex;
  border-top:1px solid #e0a96d;
  z-index:9999;
}
.footer button {
  flex:1;
  background:none;
  color:#5a3e1b;
  border:none;
  padding:12px;
  font-size:14px;
}

.official {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #e0a96d;
  cursor:pointer;
}

.task-record { 
  margin-top:10px; 
  padding:10px; 
  background:#ffe0b2; 
  border:1px solid #e0a96d; 
  border-radius:6px; 
  font-size:14px; 
}
.filter-btn { 
  display:inline-block; 
  margin:3px; 
  padding:4px 8px; 
  background:#ffa726; 
  color:#fff; 
  border-radius:4px; 
  cursor:pointer; 
  font-size:12px; 
}

/* 請加在 style 區塊內 */
.nav-link{
  margin-top:6px;
}
.nav-link a{
  display:inline-block;
  text-decoration:none;
  background:linear-gradient(to bottom,#ffe082,#ffb300);
  color:#5a3e1b;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  transition:all .2s ease;
}
.nav-link a:hover{
  transform:translateY(-2px);
  background:linear-gradient(to bottom,#ffd54f,#ffa000);
}

</style>
</head>
<body>

<header>
  <div id="time">第 1 年・春</div>
  <!-- 請直接加在 <header> 裡面，建議放在 <div id="time">...</div> 下方 -->
<div class="nav-link">
  <a href="emperor.html"> 🏛 返回皇帝管理首頁 </a>
</div>
  <div class="stat">
    <span id="gold">💰 43000</span>
    <span id="people">😊 100</span>
    <span id="army">⚔️ 80</span>
    <span id="fame">⭐ 100</span>
  </div>
</header>

<div class="container">

<!-- 御書房 -->
<div id="court" class="panel">
  <h2>御書房・奏摺</h2>
  <p id="memoTitle"></p>
  <p id="memoText"></p>
  <div id="memoBtns"></div>
  <button class="btn-gray" onclick="nextSeason()">▶ 推進一季</button>
  <button class="btn-green" onclick="aiProposal()">💡 AI 宰相提案</button>
</div>

<!-- 六部 -->
<div id="six" class="panel hidden">
  <h2>皇帝六部</h2>
  <div class="official" onclick="openTask('吏部','王守德')">吏部尚書 王守德<span>整飭官僚</span></div>
  <div class="official" onclick="openTask('戶部','錢廣進')">戶部尚書 錢廣進<span>財政賦稅</span></div>
  <div class="official" onclick="openTask('禮部','范禮賢')">禮部尚書 范禮賢<span>禮制教化</span></div>
  <div class="official" onclick="openTask('兵部','穆鐵血')">兵部尚書 穆鐵血<span>軍政邊防</span></div>
  <div class="official" onclick="openTask('刑部','法不容')">刑部尚書 法不容<span>法紀刑名</span></div>
  <div class="official" onclick="openTask('工部','班魚達')">工部尚書 班魚達<span>工程建設</span></div>
</div>

<!-- 任務面板 -->
<div id="taskPanel" class="panel hidden">
  <h2 id="taskTitle"></h2>
  <div id="taskBtns"></div>
  <button class="btn-red" onclick="closeTask()">返回</button>
</div>

<!-- 任務列表與歷史 -->
<div id="taskList" class="panel hidden">
  <h2>📋 進行中任務</h2>
  <div id="tasks">目前無任務</div>
  <h2>✅ 任務歷史紀錄</h2>
  <div id="filterBtns"></div>
  <div id="taskHistory">目前無歷史紀錄</div>
</div>

<!-- 後宮 / 皇位 -->
<div id="palace" class="panel hidden">
  <h2>🏰 後宮子嗣 & 皇位風險</h2>
  <p id="heirs">子嗣：0</p>
  <p id="succession">皇位風險：安全</p>
</div>

<!-- 存檔 -->
<div class="panel">
  <button class="btn-green" onclick="saveGame()">💾 存檔</button>
  <button class="btn-gray" onclick="loadGame()">📂 讀檔</button>
  <button class="btn-red" onclick="resetGame()">🔄 重置</button>
</div>

</div>

<div class="footer">
  <button onclick="showPanel('court')">上朝</button>
  <button onclick="showPanel('six')">六部</button>
  <button onclick="showPanel('taskList')">任務</button>
  <button onclick="showPanel('palace')">後宮</button>
</div>

<script>
/* ===== 基本數值 ===== */
let year=1, seasons=["春","夏","秋","冬"], si=0;
let gold=43000, people=100, army=80, fame=100;
let heirs=0;

const goldEl=document.getElementById("gold"),
      peopleEl=document.getElementById("people"),
      armyEl=document.getElementById("army"),
      fameEl=document.getElementById("fame"),
      heirsEl=document.getElementById("heirs"),
      successionEl=document.getElementById("succession");

function updateStats(){
  goldEl.innerText=`💰 ${gold}`;
  peopleEl.innerText=`😊 ${people}`;
  armyEl.innerText=`⚔️ ${army}`;
  fameEl.innerText=`⭐ ${fame}`;
}
function updateTime(){document.getElementById("time").innerText=`第 ${year} 年・${seasons[si]}`;}
function updateHeirs(){ heirsEl.innerText=`子嗣：${heirs}`; }
function updateSuccession(){
  let risk=(fame<30 || people<50)? "不穩": "安全";
  successionEl.innerText=`皇位風險：${risk}`;
}

/* ===== 奏摺 ===== */
const memos=[
{title:"戶部奏請清查逃稅",text:"近年商賈隱匿稅銀，國課流失，請旨徹查。",
 opts:[{t:"嚴查徵稅",g:3000,p:-5},{t:"緩查安民",g:1000,p:+2},{t:"暫不處理",g:0,p:-2}]},
{title:"兵部奏報邊防吃緊",text:"北境蠻族異動頻繁，請增兵備戰。",
 opts:[{t:"即刻增兵",a:+5,f:+2,g:-2000},{t:"派使安撫",f:+3},{t:"不予理會",p:-5}]}
];
function loadMemo(){
  const m=memos[Math.floor(Math.random()*memos.length)];
  document.getElementById("memoTitle").innerText=m.title;
  document.getElementById("memoText").innerText=m.text;
  const memoBtns=document.getElementById("memoBtns");
  memoBtns.innerHTML="";
  m.opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="btn-green";
    b.innerText=o.t;
    b.onclick=()=>{
      gold+=o.g||0; people+=o.p||0; army+=o.a||0; fame+=o.f||0;
      updateStats(); loadMemo();
    };
    memoBtns.appendChild(b);
  });
}

/* ===== 六部任務 ===== */
const deptTasks={
"吏部":[{task:"整頓冗官", g:0,p:2,a:0,f:1,desc:"整頓冗官，提升官僚效率"}],
"戶部":[{task:"清查賦稅", g:2000,p:0,a:0,f:0,desc:"清查賦稅，增加財政收入"},{task:"招募胡商", g:1000,p:0,a:5,f:0,desc:"招募胡商，增加軍力"}],
"禮部":[{task:"修宗廟", g:0,p:1,a:0,f:3,desc:"修繕宗廟，提升民心與聲望"}],
"兵部":[{task:"邊防演練", g:0,p:0,a:3,f:0,desc:"邊防演練，提高軍力"}],
"刑部":[{task:"整頓法紀", g:0,p:2,a:0,f:0,desc:"整頓法紀，提升民心"}],
"工部":[{task:"修築水利", g:0,p:1,a:0,f:0,desc:"修築水利，改善民生"}]
};
let activeTasks=[], current={}, taskHistory=[];

function openTask(dept,name){
  current={dept,name};
  document.getElementById("taskTitle").innerText=`${dept}尚書 ${name}`;
  const taskBtns=document.getElementById("taskBtns");
  taskBtns.innerHTML="";
  deptTasks[dept].forEach(t=>{
    const b=document.createElement("button");
    b.className="btn-green";
    b.innerText=t.task;
    b.onclick=()=>assignTask(t);
    taskBtns.appendChild(b);
  });
  document.getElementById("taskPanel").classList.remove("hidden");
}
function closeTask(){document.getElementById("taskPanel").classList.add("hidden");}

function assignTask(t){
  activeTasks.push({dept:current.dept, officer:current.name, ...t, remain:2});
  updateTaskList();
  closeTask();
}

/* 任務更新與歷史紀錄 */
function updateTaskList(){
  const tasksDiv=document.getElementById("tasks");
  const histDiv=document.getElementById("taskHistory");
  if(activeTasks.length===0){tasksDiv.innerText="目前無任務";}
  else tasksDiv.innerHTML=activeTasks.map(t=>`【${t.dept}】${t.officer}－${t.task}（剩 ${t.remain} 季）`).join("<br>");
  
  if(taskHistory.length===0){histDiv.innerText="目前無歷史紀錄";}
  else {
    histDiv.innerHTML=taskHistory.map(h=>`【${h.dept}】${h.officer}－${h.task}：${h.desc} → 💰${h.g>=0?'+':''}${h.g}，😊${h.p>=0?'+':''}${h.p}，⚔️${h.a>=0?'+':''}${h.a}，⭐${h.f>=0?'+':''}${h.f}（完成: 第${h.year}年${seasons[h.si]}）`).join("<br>");
  }
  generateFilterButtons();
}

/* 任務分類過濾 */
function generateFilterButtons(){
  const filterDiv=document.getElementById("filterBtns");
  const depts=[...new Set(taskHistory.map(h=>h.dept))];
  filterDiv.innerHTML='';
  depts.forEach(d=>{
    const btn=document.createElement("span");
    btn.className="filter-btn";
    btn.innerText=d;
    btn.onclick=()=>filterHistory(d);
    filterDiv.appendChild(btn);
  });
  if(depts.length>0){
    const allBtn=document.createElement("span");
    allBtn.className="filter-btn";
    allBtn.innerText="全部";
    allBtn.onclick=()=>filterHistory(null);
    filterDiv.appendChild(allBtn);
  }
}
function filterHistory(dept){
  const histDiv=document.getElementById("taskHistory");
  let filtered=dept?taskHistory.filter(h=>h.dept===dept):taskHistory;
  if(filtered.length===0){histDiv.innerText="無紀錄";}
  else histDiv.innerHTML=filtered.map(h=>`【${h.dept}】${h.officer}－${h.task}：${h.desc} → 💰${h.g>=0?'+':''}${h.g}，😊${h.p>=0?'+':''}${h.p}，⚔️${h.a>=0?'+':''}${h.a}，⭐${h.f>=0?'+':''}${h.f}（完成: 第${h.year}年${seasons[h.si]}）`).join("<br>");
}

/* AI 宰相 */
function aiProposal(){
  if(!memos.length) return;
  const choice=Math.floor(Math.random()*memos.length);
  const m=memos[choice];
  if(m.opts.length>0){
    const opt=m.opts[Math.floor(Math.random()*m.opts.length)];
    gold+=opt.g||0; people+=opt.p||0; army+=opt.a||0; fame+=opt.f||0;
    updateStats();
    alert("AI 宰相提案:\n"+m.title+"\n採取: "+opt.t);
  }
}

/* 推進季節與任務完成 */
function nextSeason(){
  si++; if(si>=4){si=0; year++;}
  // 後宮子嗣
  if(Math.random()<0.3){heirs++; updateHeirs();}
  // 任務完成
  let completed=[];
  activeTasks.forEach(t=>t.remain--);
  activeTasks=activeTasks.filter(t=>{
    if(t.remain<=0){
      gold+=t.g; people+=t.p; army+=t.a; fame+=t.f;
      taskHistory.push({...t, year, si});
      completed.push(`【${t.dept}】${t.officer}－${t.task}完成！`);
      return false;
    }
    return true;
  });
  if(completed.length>0) alert("任務完成:\n"+completed.join("\n"));
  updateStats(); updateTime(); updateTaskList(); updateSuccession();
}

/* 存檔系統 */
function saveGame(){
  const data={year,si,gold,people,army,fame,activeTasks,taskHistory,heirs};
  localStorage.setItem("emperorSave",JSON.stringify(data));
  alert("遊戲已存檔！");
}
function loadGame(){
  const data=JSON.parse(localStorage.getItem("emperorSave"));
  if(data){
    ({year,si,gold,people,army,fame,activeTasks,taskHistory,heirs}=data);
    updateStats(); updateTime(); updateTaskList(); updateHeirs(); updateSuccession();
    alert("遊戲已讀檔！");
  } else alert("無存檔！");
}
function resetGame(){
  if(confirm("確定重置遊戲？")){localStorage.removeItem("emperorSave"); location.reload();}
}

/* 切換面板 */
function showPanel(id){
  ['court','six','taskList','taskPanel','palace'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

/* 初始化 */
updateTime(); updateStats(); loadMemo(); updateTaskList(); updateHeirs(); updateSuccession();
</script>

</body>
</html>
