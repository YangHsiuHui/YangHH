<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皇帝・極盛治世｜中央御書房</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Noto Serif TC", serif;
  background:linear-gradient(to bottom,#fff3e0,#ffe0b2);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px 10px;
  color:#5a3e1b;
}

/* ===== 中央固定主框 ===== */
.app-shell{
  width:100%;
  max-width:1200px;
  background:rgba(255,248,225,0.98);
  border:3px solid #d7a55a;
  border-radius:18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.18);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== 頂部 ===== */
header{
  background:linear-gradient(to bottom,#ffd180,#ffb74d);
  padding:16px 20px;
  border-bottom:2px solid #d7a55a;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.top-left{
  display:flex;
  flex-direction:column;
  gap:8px;
}

#time{
  font-size:26px;
  font-weight:bold;
}

.nav-link a{
  text-decoration:none;
  display:inline-block;
  background:linear-gradient(to bottom,#ffe082,#ffb300);
  color:#5a3e1b;
  padding:8px 14px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.stat{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  font-size:16px;
  font-weight:bold;
}

/* ===== 內容區 ===== */
.container{
  padding:18px;
  min-height:650px;
}

.panel{
  background:#fff8e8;
  border:1px solid #e0a96d;
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
}

.panel h2{
  color:#d67f00;
  margin-bottom:14px;
}

.hidden{
  display:none;
}

/* ===== 按鈕 ===== */
button{
  width:100%;
  max-width:320px;
  padding:11px 14px;
  margin:8px auto 0;
  display:block;
  border:none;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  transition:all .2s ease;
}

button:hover{
  transform:translateY(-2px);
}

.btn-green{background:#ffa726;color:#fff;}
.btn-gray{background:#90a4ae;color:#fff;}
.btn-red{background:#d84315;color:#fff;}

/* ===== 六部 ===== */
.official{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  padding:10px;
  border-bottom:1px solid #e0a96d;
  cursor:pointer;
}

/* ===== 任務分類 ===== */
.filter-btn{
  display:inline-block;
  margin:4px;
  padding:5px 10px;
  background:#ffa726;
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

/* ===== 底部功能列（框內固定） ===== */
.footer{
  border-top:2px solid #d7a55a;
  background:linear-gradient(to bottom,#ffd180,#ffb74d);
  padding:12px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.footer button{
  width:auto;
  min-width:110px;
  max-width:180px;
  margin:0;
  background:linear-gradient(to bottom,#ffe082,#ffb300);
  color:#5a3e1b;
  font-weight:bold;
}

/* ===== 桌機 ===== */
@media (min-width:992px){
  #memoBtns,#taskBtns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  #memoBtns button,#taskBtns button{
    width:auto;
    min-width:180px;
    margin:0;
  }
}

/* ===== 手機 ===== */
@media (max-width:767px){
  body{
    padding:8px;
  }

  header{
    flex-direction:column;
    align-items:flex-start;
  }

  #time{
    font-size:22px;
  }

  .footer button{
    flex:1 1 calc(50% - 10px);
    min-width:auto;
  }
}
</style>
</head>
<body>

<div class="app-shell">

<header>
  <div class="top-left">
    <div id="time">第 1 年・春</div>
    <div class="nav-link">
      <a href="emperor.html">🏛 返回皇帝管理首頁</a>
    </div>
  </div>

  <div class="stat">
    <span id="gold">💰 43000</span>
    <span id="people">😊 100</span>
    <span id="army">⚔️ 80</span>
    <span id="fame">⭐ 100</span>
  </div>
</header>

<div class="container">

<!-- 御書房 -->
<div id="court" class="panel">
  <h2>御書房・奏摺</h2>
  <p id="memoTitle"></p><br>
  <p id="memoText"></p>
  <div id="memoBtns"></div>
  <button class="btn-gray" onclick="nextSeason()">▶ 推進一季</button>
  <button class="btn-green" onclick="aiProposal()">💡 AI 宰相提案</button>
</div>

<!-- 六部 -->
<div id="six" class="panel hidden">
  <h2>皇帝六部</h2>
  <div class="official" onclick="openTask('吏部','王守德')">吏部尚書 王守德<span>整飭官僚</span></div>
  <div class="official" onclick="openTask('戶部','錢廣進')">戶部尚書 錢廣進<span>財政賦稅</span></div>
  <div class="official" onclick="openTask('禮部','范禮賢')">禮部尚書 范禮賢<span>禮制教化</span></div>
  <div class="official" onclick="openTask('兵部','穆鐵血')">兵部尚書 穆鐵血<span>軍政邊防</span></div>
  <div class="official" onclick="openTask('刑部','法不容')">刑部尚書 法不容<span>法紀刑名</span></div>
  <div class="official" onclick="openTask('工部','班魚達')">工部尚書 班魚達<span>工程建設</span></div>
</div>

<!-- 任務 -->
<div id="taskPanel" class="panel hidden">
  <h2 id="taskTitle"></h2>
  <div id="taskBtns"></div>
  <button class="btn-red" onclick="closeTask()">返回</button>
</div>

<div id="taskList" class="panel hidden">
  <h2>📋 進行中任務</h2>
  <div id="tasks">目前無任務</div>
  <h2>✅ 任務歷史紀錄</h2>
  <div id="filterBtns"></div>
  <div id="taskHistory">目前無歷史紀錄</div>
</div>

<!-- 後宮 -->
<div id="palace" class="panel hidden">
  <h2>🏰 後宮子嗣 & 皇位風險</h2>
  <p id="heirs">子嗣：0</p>
  <p id="succession">皇位風險：安全</p>
</div>

<!-- 存檔 -->
<div class="panel">
  <button class="btn-green" onclick="saveGame()">💾 存檔</button>
  <button class="btn-gray" onclick="loadGame()">📂 讀檔</button>
  <button class="btn-red" onclick="resetGame()">🔄 重置</button>
</div>

</div>

<!-- 框內底部功能列 -->
<div class="footer">
  <button onclick="showPanel('court')">上朝</button>
  <button onclick="showPanel('six')">六部</button>
  <button onclick="showPanel('taskList')">任務</button>
  <button onclick="showPanel('palace')">後宮</button>
</div>

</div>

<script>
/* ===== 基本 ===== */
let year=1,seasons=["春","夏","秋","冬"],si=0;
let gold=43000,people=100,army=80,fame=100,heirs=0;

const goldEl=document.getElementById("gold"),
peopleEl=document.getElementById("people"),
armyEl=document.getElementById("army"),
fameEl=document.getElementById("fame"),
heirsEl=document.getElementById("heirs"),
successionEl=document.getElementById("succession");

function updateStats(){
  goldEl.innerText=`💰 ${gold}`;
  peopleEl.innerText=`😊 ${people}`;
  armyEl.innerText=`⚔️ ${army}`;
  fameEl.innerText=`⭐ ${fame}`;
}
function updateTime(){
  document.getElementById("time").innerText=`第 ${year} 年・${seasons[si]}`;
}
function updateHeirs(){heirsEl.innerText=`子嗣：${heirs}`;}
function updateSuccession(){
  successionEl.innerText=`皇位風險：${(fame<30||people<50)?"不穩":"安全"}`;
}

/* ===== 十則偏國庫平衡奏摺 ===== */
const memos=[
{title:"戶部奏請鹽稅改革",text:"調整鹽稅制度，可增國庫且減少私鹽。",opts:[{t:"全面改革",g:3500,p:2,f:1},{t:"局部試行",g:1800,p:1},{t:"維持現狀",g:0}]},
{title:"商道擴建",text:"西域商路繁盛，可招商增收。",opts:[{t:"擴建商道",g:3000,f:2},{t:"保守經營",g:1200},{t:"暫不投入",f:-1}]},
{title:"農田水利",text:"修繕灌溉可提升收成與稅收。",opts:[{t:"全面治水",g:1500,p:5},{t:"局部整修",g:800,p:2},{t:"延後",p:-3}]},
{title:"邊防屯田",text:"邊軍可自給自足並節省軍費。",opts:[{t:"推行屯田",g:2200,a:2},{t:"小規模試辦",g:1000,a:1},{t:"不推行",a:-2}]},
{title:"科舉擴招",text:"廣納賢才可穩政興邦。",opts:[{t:"增設恩科",f:3,p:2,g:-500},{t:"維持現制",f:1},{t:"縮減",g:800,f:-2}]},
{title:"官倉盤點",text:"清查庫存可防浪費。",opts:[{t:"全面盤點",g:2500,f:2},{t:"地方自查",g:1200},{t:"不查",f:-2}]},
{title:"市集減稅",text:"短期減稅可促進交易。",opts:[{t:"減稅振商",g:1000,p:4},{t:"小幅減免",g:500,p:2},{t:"維持",g:0}]},
{title:"宗廟節費",text:"簡化祭典可節流。",opts:[{t:"節省開支",g:2000,f:1},{t:"部分簡化",g:1000},{t:"維持隆重",f:2,g:-1000}]},
{title:"海港通商",text:"沿海貿易興盛可充實國庫。",opts:[{t:"全面開港",g:4000,f:2},{t:"限制開放",g:1800},{t:"封港",f:-3}]},
{title:"地方官整頓",text:"整治冗官可節省俸祿。",opts:[{t:"裁撤冗員",g:2800,p:1,f:2},{t:"逐步整編",g:1500},{t:"維持",g:0}]}
];

function loadMemo(){
  const m=memos[Math.floor(Math.random()*memos.length)];
  memoTitle.innerText=m.title;
  memoText.innerText=m.text;
  memoBtns.innerHTML="";
  m.opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="btn-green";
    b.innerText=o.t;
    b.onclick=()=>{
      gold+=o.g||0;
      people+=o.p||0;
      army+=o.a||0;
      fame+=o.f||0;
      updateStats();
      updateSuccession();
      loadMemo();
    };
    memoBtns.appendChild(b);
  });
}

/* ===== 以下保留原功能 ===== */
const deptTasks={
"吏部":[{task:"整頓冗官",g:0,p:2,a:0,f:1,desc:"整頓冗官，提升官僚效率"}],
"戶部":[{task:"清查賦稅",g:2000,p:0,a:0,f:0,desc:"清查賦稅，增加財政收入"},{task:"招募胡商",g:1000,p:0,a:5,f:0,desc:"招募胡商，增加軍力"}],
"禮部":[{task:"修宗廟",g:0,p:1,a:0,f:3,desc:"修繕宗廟，提升民心與聲望"}],
"兵部":[{task:"邊防演練",g:0,p:0,a:3,f:0,desc:"邊防演練，提高軍力"}],
"刑部":[{task:"整頓法紀",g:0,p:2,a:0,f:0,desc:"整頓法紀，提升民心"}],
"工部":[{task:"修築水利",g:0,p:1,a:0,f:0,desc:"修築水利，改善民生"}]
};

let activeTasks=[],current={},taskHistory=[];

function openTask(dept,name){
  current={dept,name};
  taskTitle.innerText=`${dept}尚書 ${name}`;
  taskBtns.innerHTML="";
  deptTasks[dept].forEach(t=>{
    const b=document.createElement("button");
    b.className="btn-green";
    b.innerText=t.task;
    b.onclick=()=>assignTask(t);
    taskBtns.appendChild(b);
  });
  showPanel("taskPanel");
}

function closeTask(){showPanel("six");}

function assignTask(t){
  activeTasks.push({...t,dept:current.dept,officer:current.name,remain:2});
  updateTaskList();
  closeTask();
}

function updateTaskList(){
  tasks.innerHTML=activeTasks.length?activeTasks.map(t=>`【${t.dept}】${t.officer}－${t.task}（剩 ${t.remain} 季）`).join("<br>"):"目前無任務";
  taskHistory.innerHTML=taskHistory.length?taskHistory.map(h=>`【${h.dept}】${h.officer}－${h.task}`).join("<br>"):"目前無歷史紀錄";
}

function nextSeason(){
  si++;
  if(si>=4){si=0;year++;}
  activeTasks.forEach(t=>t.remain--);
  activeTasks=activeTasks.filter(t=>{
    if(t.remain<=0){
      gold+=t.g;people+=t.p;army+=t.a;fame+=t.f;
      taskHistory.push({...t,year,si});
      return false;
    }
    return true;
  });
  if(Math.random()<0.25){heirs++;}
  updateStats();
  updateTime();
  updateHeirs();
  updateSuccession();
  updateTaskList();
}

function aiProposal(){
  alert("AI 宰相提案：開源節流、以商養國、以民固本。");
}

function saveGame(){
  localStorage.setItem("emperorSave",JSON.stringify({year,si,gold,people,army,fame,heirs,activeTasks,taskHistory}));
}

function loadGame(){
  const data=JSON.parse(localStorage.getItem("emperorSave"));
  if(data){
    ({year,si,gold,people,army,fame,heirs,activeTasks,taskHistory}=data);
    updateStats();updateTime();updateHeirs();updateSuccession();updateTaskList();
  }
}

function resetGame(){
  localStorage.removeItem("emperorSave");
  location.reload();
}

function showPanel(id){
  ["court","six","taskList","taskPanel","palace"].forEach(p=>document.getElementById(p).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* 初始化 */
updateStats();
updateTime();
updateHeirs();
updateSuccession();
updateTaskList();
loadMemo();
</script>

</body>
</html>
