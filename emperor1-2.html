/* 國庫顯示壓縮 + 等級 */
function formatTreasury(val){
  let s = val.toString();
  if(s.length < 5) return s + " 京美金";

  const levels = [
    {name:"府庫", digit:4},
    {name:"州庫", digit:8},
    {name:"國庫", digit:12},
    {name:"天庫", digit:20},
    {name:"混沌神庫", digit:999}
  ];

  for(let i=levels.length-1;i>=0;i--){
    if(s.length > levels[i].digit){
      return `${s.slice(0,3)}...${levels[i].name}（京美金）`;
    }
  }
  return s + " 京美金";
}

function getLevel(val){
  let len = val.toString().length;
  if(len < 20) return "府庫";
  if(len < 40) return "州庫";
  if(len < 80) return "國庫";
  return "天庫";
}

const turnEl = document.getElementById('turn');

  tVal.textContent = formatTreasury(state.treasury);
  tLevel.textContent = "等級：" + getLevel(state.treasury);

{title:"公宅興建爭議", body:"工部與戶部爭論：京畿房價騰貴，寒士與庶民居無定所，然廣建公宅又涉財政支出與土地調度。民間盼安居，朝廷需平衡財政。臣請審慎規劃，兼顧民生。", effects:{allow:{people:+10,stability:+6,treasury:+1},reject:{people:-9,stability:-5,treasury:+2},hold:{people:-3,stability:-2,treasury:0}}},

{title:"水庫見底", body:"水部急報：南北多地久旱不雨，蓄水漸竭，農田灌溉與民生供水皆告緊張。若不及早調度，恐生缺水與產業停滯。臣請興修水利、再生水道，以備長策。", effects:{allow:{people:+9,stability:+8,treasury:+2},reject:{people:-10,stability:-8,treasury:0},hold:{people:-4,stability:-3,treasury:0}}},

{title:"颱風防災整備", body:"欽天監預測：風季將至，沿海與山區恐有強風暴雨。往年災損未遠，百姓憂心。臣請整備糧草、修築防洪、演練撤離，以減災禍。", effects:{allow:{people:+8,stability:+8,treasury:+1},reject:{people:-11,stability:-9,treasury:0},hold:{people:-4,stability:-3,treasury:0}}},

{title:"國營事業改革", body:"戶部查核：部分官營事業冗員繁多，效率低落，年耗國帑。若能整頓制度、提升效能，則可開源節流。然改革恐觸既得之利。臣請明斷。", effects:{allow:{people:+4,stability:+7,treasury:+12},reject:{people:-3,stability:-4,treasury:0},hold:{people:-1,stability:-2,treasury:0}}},

{title:"最低工資調整", body:"百工上書：物價日升，而薪資未隨，基層勞者難保溫飽。商賈則憂成本上揚。臣請衡酌民生與產業，適度調薪，以穩庶民。", effects:{allow:{people:+11,stability:+5,treasury:+2},reject:{people:-10,stability:-6,treasury:+1},hold:{people:-3,stability:-2,treasury:0}}},

{title:"外交盟友訪朝", body:"禮部奏：海外盟邦使節來朝，可拓商路、增國際聲望，亦可穩邊疆局勢。然接待與承諾需慎。臣請善用此機，以壯國威。", effects:{allow:{people:+4,stability:+9,treasury:+4},reject:{people:-2,stability:-4,treasury:0},hold:{people:-1,stability:-2,treasury:0}}},

{title:"假學歷官員案", body:"御史台揭發：有官員藉偽造學歷、粉飾履歷而入仕，損朝廷威信，傷士子公平。民間譁然。臣請徹查嚴懲，以正朝綱。", effects:{allow:{people:+8,stability:+10,treasury:+1},reject:{people:-12,stability:-10,treasury:0},hold:{people:-4,stability:-4,treasury:0}}},

{title:"國軍募兵不足", body:"兵部奏報：近年兵源漸減，青年從軍意願不高，邊防與戰備恐受影響。若不整飭待遇與榮譽，恐軍心不足。", effects:{allow:{people:+2,stability:+12,treasury:+1},reject:{people:-7,stability:-14,treasury:0},hold:{people:-3,stability:-5,treasury:0}}},

{title:"網購稅制改革", body:"商部呈報：網路商賈盛行，傳統稅制難應新商路，恐生漏稅與不公。若善制新法，可充國庫並維市場秩序。", effects:{allow:{people:+4,stability:+4,treasury:+10},reject:{people:-3,stability:-2,treasury:0},hold:{people:-1,stability:-1,treasury:0}}},

{title:"山林火災", body:"林務使急奏：山林大火頻仍，生靈受損，水土保持亦危。若不及早救援與防範，恐釀長久之患。", effects:{allow:{people:+7,stability:+6,treasury:+1},reject:{people:-8,stability:-7,treasury:0},hold:{people:-3,stability:-2,treasury:0}}},

{title:"青年創業基金", body:"工部與商部聯奏：青年有志創新，然苦無本錢。若朝廷設基金扶助，可興百業、增稅源、振經濟。", effects:{allow:{people:+9,stability:+5,treasury:+8},reject:{people:-5,stability:-3,treasury:0},hold:{people:-2,stability:-1,treasury:0}}},

{title:"觀光復甦計畫", body:"疫後旅宿蕭條，商圈未振。各州府請求重整觀光、修景點、迎四方旅人，以活絡地方財政。", effects:{allow:{people:+8,stability:+4,treasury:+10},reject:{people:-4,stability:-2,treasury:0},hold:{people:-1,stability:-1,treasury:0}}},

{title:"疫病再起傳聞", body:"太醫院密報：鄰邦有新疫傳聞，雖未大流行，然若輕忽恐重蹈舊患。臣請邊關檢疫、藥材儲備、防患未然。", effects:{allow:{people:+8,stability:+8,treasury:-1},reject:{people:-12,stability:-10,treasury:0},hold:{people:-4,stability:-4,treasury:0}}},

{title:"司法改革呼聲", body:"刑部與民間共陳：冤案、久審、量刑不均之議漸多，百姓盼法治更明。臣請修法整制，以昭公信。", effects:{allow:{people:+10,stability:+9,treasury:+1},reject:{people:-11,stability:-9,treasury:0},hold:{people:-4,stability:-3,treasury:0}}},

    ];


/* 隨機 */
function getRandom(){
  return JSON.parse(JSON.stringify(memorials[Math.floor(Math.random()*memorials.length)]));
}

let current = getRandom();

function render(){
  memorialEl.innerHTML = `【${current.title}】\n\n${current.body}`;
}

/* BigInt運算 */
function applyEffect(type){
  let e = current.effects[type];

  state.people += e.people || 0;
  state.stability += e.stability || 0;
  state.treasury += BigInt(e.treasury || 0);
}

/* log */
function log(text){
  let d = document.createElement("div");
  d.textContent = `回合${state.turn}：${text}`;
  logEl.prepend(d);
}

/* 行動 */
function act(type){
  applyEffect(type);

  log(`選擇${type}`);

  state.turn++;

  if(state.turn > state.maxTurns){
    alert("結束");
    return;
  }

  current = getRandom();
  render();
  updateStats();
}

/* init */
render();
updateStats();

document.getElementById('btnAllow').onclick=()=>act('allow');
document.getElementById('btnReject').onclick=()=>act('reject');
document.getElementById('btnHold').onclick=()=>act('hold');

</script>

</body>
</html>
