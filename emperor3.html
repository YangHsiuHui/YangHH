<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>NPC 佛王審判系統</title>

<!-- 請直接用以下內容「取代你原本的 .container、.left、.center、.panel CSS」，
目標：改成像 emperor1 那種「桌面管理介面」：
✔ 左側固定控制欄
✔ 中央上方佛王
✔ 下方大型固定審判主面板
✔ 桌面版高度完整利用
✔ 手機仍保留響應式
-->

<style>

/* ===== 主畫面（桌面式）===== */
.container{
  display:flex;
  height:calc(100vh - 72px); /* 扣掉header高度 */
}

/* ===== 左側控制台 ===== */
.left{
  width:260px;
  min-width:260px;
  background:#ffffffee;
  backdrop-filter: blur(8px);
  border-right:1px solid #ddd;
  padding:12px;
  overflow-y:auto;
}

/* ===== 中央主區 ===== */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px;
  overflow:hidden;
}

/* ===== 佛王NPC固定上方 ===== */
.npc{
  width:140px;
  height:140px;
  min-height:140px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ffe9b3,#e0c36a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  box-shadow:0 0 20px rgba(255,215,0,0.4);
  margin-bottom:18px;
  animation:glow 2s infinite;
}

/* ===== 下方大型審判面板（像 emperor1 主奏摺區）===== */
.panel{
  background:white;
  width:min(900px,95%);
  flex:1;
  min-height:420px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  padding:24px;
  text-align:center;
  overflow-y:auto;
  border-top:4px solid #e0c36a;
}

/* ===== 業力報告標題 ===== */
.panel div:first-child{
  font-size:22px;
  font-weight:bold;
  margin-bottom:18px;
  color:#8a6d1d;
}

/* ===== 狀態區 ===== */
#status{
  font-size:20px;
  line-height:2;
  padding:18px;
  background:#f9fafc;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #eee;
}

/* ===== 結果 ===== */
.result{
  font-size:26px;
  font-weight:bold;
  margin-top:16px;
  color:#8a6d1d;
}

/* ===== NPC對話 ===== */
.dialog{
  margin-top:20px;
  font-size:18px;
  line-height:1.8;
  color:#555;
  background:#fff8dc;
  padding:16px;
  border-radius:12px;
}

/* ===== 按鈕 ===== */
button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#f5f5f5;
  font-size:16px;
}
button:hover{
  background:#fff3cd;
}

/* ===== 手機 / 平板 響應式優化（請直接取代你原本 @media max-width:768px 區塊）=====
目標：
✔ 橫向手機（landscape）完整可視
✔ 直向手機佛王卡片不過長
✔ 中央卡片更像 emperor1 精簡版
✔ 左側按鈕更整齊
*/

@media (max-width: 992px){

  /* 整體改直式排列 */
  .container{
    flex-direction:column;
    height:auto;
    min-height:100vh;
  }

  /* 左側控制欄改上方工具列 */
  .left{
    width:100%;
    min-width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    border-right:none;
    border-bottom:1px solid #ddd;
    padding:10px;
    gap:8px;
  }

  /* 返回首頁全寬 */
  .left a{
    width:100%;
    margin-bottom:4px;
  }

  /* 按鈕手機版 */
  .left button{
    width:48%;
    flex:1 1 48%;
    min-height:44px;
    font-size:14px;
    margin:0;
  }

  /* 中央 */
  .center{
    padding:12px 10px 20px;
    overflow:visible;
  }

  /* 佛王縮小 */
  .npc{
    width:110px;
    height:110px;
    min-height:110px;
    margin-bottom:12px;
    font-size:16px;
  }

  /* 主卡片縮短 */
  .panel{
    width:100%;
    max-width:680px;
    min-height:auto;      /* 不強制超長 */
    flex:none;
    padding:16px 14px;
    border-radius:14px;
  }

  /* 標題 */
  .panel div:first-child{
    font-size:20px;
    margin-bottom:12px;
  }

  /* 狀態區縮短 */
  #status{
    font-size:16px;
    line-height:1.8;
    padding:12px;
    margin-bottom:14px;
  }

  /* 結果 */
  .result{
    font-size:22px;
    margin-top:10px;
  }

  /* 對話框 */
  .dialog{
    font-size:15px;
    line-height:1.7;
    padding:12px;
    margin-top:14px;
  }
}


/* ===== 橫向手機專用（高度不足時避免卡片太高）===== */
@media (max-width: 992px) and (orientation: landscape){

  header{
    padding:10px;
    font-size:16px;
  }

  .left{
    padding:8px;
    gap:6px;
  }

  .left button{
    width:19%;
    flex:1 1 19%;
    font-size:13px;
    padding:8px;
  }

  .left a{
    width:100%;
  }

  .center{
    padding:8px;
  }

  .npc{
    width:85px;
    height:85px;
    min-height:85px;
    margin-bottom:8px;
    font-size:14px;
  }

  .panel{
    max-width:95%;
    padding:12px;
  }

  #status{
    font-size:14px;
    line-height:1.6;
    padding:10px;
  }

  .result{
    font-size:18px;
  }

  .dialog{
    font-size:13px;
    padding:10px;
  }
}

</style>

</head>

<body>

<header>
🧿 NPC 佛王審判系統｜因果判定 × 六道輪迴 × 業力審核
</header>

<div class="container">

<!-- 左側操作 -->
<div class="left">

<a href="emperor.html" style="
  display:block;
  text-decoration:none;
  text-align:center;
  padding:10px;
  margin-bottom:10px;
  background:#e0c36a;
  color:#333;
  border-radius:8px;
  font-weight:bold;
">
🔙 回皇帝管理首頁
</a>

  <button onclick="addGood()">🙏 登記善行</button>
  <button onclick="addBad()">⚠ 登記惡業</button>
  <button onclick="addMeditation()">📿 修行記錄</button>
  <button onclick="judge()">⚖ 佛王審判</button>
  <button onclick="reset()">🔄 清空業簿</button>
</div>

<!-- 中央 -->
<div class="center">

  <div class="npc">👑 佛王NPC</div>

  <div class="panel">
    <div>📜 業力報告</div>

    <div id="status">
      功德：0<br>
      業力：0<br>
      修行：0
    </div>

    <div class="result" id="result">
      尚未審判
    </div>

    <div class="dialog" id="dialog">
      佛王：「眾生所作，一切皆記錄於因果簿。」
    </div>

  </div>

</div>

</div>

<script>

let good = 0;
let bad = 0;
let med = 0;

/* 更新顯示 */
function update(){
  document.getElementById("status").innerHTML =
  "功德：" + good +
  "<br>業力：" + bad +
  "<br>修行：" + med;
}

/* 登記善行 */
function addGood(){
  good += 10;
  update();
}

/* 惡業 */
function addBad(){
  bad += 10;
  update();
}

/* 修行 */
function addMeditation(){
  med += 5;
  good += 3;
  update();
}

/* 佛王審判 */
function judge(){

  let score = good + med - bad;

  let result = "";
  let speak = "";

  if(score > 60){
    result = "🪷 極樂世界（蓮花化生）";
    speak = "佛王：「善業圓滿，可入清淨佛國。」";
  }
  else if(score > 30){
    result = "🌤 天道";
    speak = "佛王：「福報尚足，但仍有執著。」";
  }
  else if(score > 0){
    result = "👤 人道";
    speak = "佛王：「人身難得，宜修正道。」";
  }
  else if(score > -30){
    result = "🐶 畜生道";
    speak = "佛王：「心念昏沉，隨業流轉。」";
  }
  else if(score > -60){
    result = "👻 餓鬼道";
    speak = "佛王：「貪執甚重，苦報現前。」";
  }
  else{
    result = "🔥 地獄道";
    speak = "佛王：「重業難解，須深懺悔。」";
  }

  document.getElementById("result").innerHTML = result;
  document.getElementById("dialog").innerHTML = "佛王：「" + speak + "」";
}

/* 重置 */
function reset(){
  good = 0;
  bad = 0;
  med = 0;
  update();
  document.getElementById("result").innerHTML = "已清空業簿";
  document.getElementById("dialog").innerHTML = "佛王：「業簿重新開始記錄。」";
}

update();

</script>

</body>
</html>
